name: Ruby

on:
  push:
    branches:
      - master
      - compat-9-2-x

  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    name: Ruby ${{ matrix.ruby }}
    strategy:
      matrix:
        ruby:
          - '3.2'
          - '3.4'
          - '4.0'

    steps:
      - uses: actions/checkout@v4
      - name: Set up Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: ${{ matrix.ruby }}
          bundler-cache: true
      - name: Copy original headers
        run: bundle exec rake compile
      - name: Verify numo-narray-alt loads
        run: bundle exec bin/test.rb
